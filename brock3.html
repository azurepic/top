<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>brock</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel2: #374151;
      --text: #f9fafb;
      --sub: #d1d5db;
      --accent: #22c55e;
      --danger: #ef4444;
      --cell: min(7vw, 28px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      touch-action: manipulation;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      padding: 16px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .screen.active {
      display: flex;
    }

    .card {
      width: 100%;
      background: var(--panel);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1, h2, p {
      margin: 0;
    }

    .title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--sub);
      line-height: 1.6;
      font-size: 15px;
    }

    .big-btn, .ctrl-btn {
      border: none;
      border-radius: 16px;
      background: var(--accent);
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }

    .big-btn {
      width: 100%;
      padding: 16px;
    }

    .big-btn:active, .ctrl-btn:active {
      transform: scale(0.98);
      filter: brightness(0.95);
    }

    #gameScreen {
      justify-content: flex-start;
      gap: 12px;
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .topbar {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: stretch;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat {
      background: var(--panel);
      border-radius: 14px;
      padding: 10px 8px;
      text-align: center;
    }

    .stat .label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 18px;
      font-weight: 800;
    }

    .small-buttons {
      display: flex;
      gap: 8px;
    }

    .small-buttons button {
      border: none;
      border-radius: 12px;
      background: var(--panel2);
      color: white;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      touch-action: manipulation;
    }

    .board-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    #board {
      background: #0b1220;
      border: 3px solid #4b5563;
      border-radius: 10px;
      display: block;
      image-rendering: pixelated;
      touch-action: none;
    }

    .controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }

    .controls-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .ctrl-btn {
      min-height: 56px;
      background: var(--panel2);
      font-size: 22px;
      font-weight: 800;
    }

    .ctrl-btn.wide {
      grid-column: span 2;
    }

    .ctrl-btn.accent {
      background: var(--accent);
    }

    .ctrl-btn.danger {
      background: var(--danger);
    }

    .hint {
      color: var(--sub);
      font-size: 12px;
      text-align: center;
      line-height: 1.5;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 20;
    }

    .overlay.active {
      display: flex;
    }

    .overlay-card {
      width: min(100%, 360px);
      background: var(--panel);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .overlay-card h2 {
      font-size: 28px;
    }

    .overlay-card p {
      color: var(--sub);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <section id="startScreen" class="screen active">
    <div class="card">
      <h1 class="title">Brock</h1>
      <p class="subtitle" style="margin-top: 14px;">
        スタートを押すとプレイ画面に切り替わって始まるよ。<br>
        iPhoneでのダブルタップ拡大もしにくくしてある。
      </p>
      <button id="startBtn" class="big-btn" style="margin-top: 20px;">スタート</button>
    </div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="topbar">
      <div class="stats">
        <div class="stat">
          <div class="label">SCORE</div>
          <div id="score" class="value">0</div>
        </div>
        <div class="stat">
          <div class="label">LINES</div>
          <div id="lines" class="value">0</div>
        </div>
        <div class="stat">
          <div class="label">LEVEL</div>
          <div id="level" class="value">1</div>
        </div>
      </div>
      <div class="small-buttons">
        <button id="restartBtn">やり直し</button>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="board" width="300" height="600"></canvas>
    </div>

    <div class="controls">
      <div class="controls-row">
        <button class="ctrl-btn" id="leftBtn">◀</button>
        <button class="ctrl-btn" id="rotateBtn">⟳</button>
        <button class="ctrl-btn" id="hardDropBtn">⬇⬇</button>
        <button class="ctrl-btn" id="rightBtn">▶</button>
      </div>
      <div class="controls-row">
        <button class="ctrl-btn wide accent" id="downBtn">⬇</button>
        <button class="ctrl-btn wide danger" id="pauseBtn">一時停止</button>
      </div>
      <div class="hint">
        左右移動・回転・即落下・1マス落下ができるよ
      </div>
    </div>
  </section>

  <div id="gameOverOverlay" class="overlay">
    <div class="overlay-card">
      <h2>ゲームオーバー</h2>
      <p>もう一回やる？</p>
      <button id="playAgainBtn" class="big-btn">もう一回</button>
    </div>
  </div>

  <script>
    // ダブルタップ拡大をかなり抑える
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (e) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('dblclick', function(e) {
      e.preventDefault();
    }, { passive: false });

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 30;

    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');

    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const gameOverOverlay = document.getElementById('gameOverOverlay');

    const scoreEl = document.getElementById('score');
    const linesEl = document.getElementById('lines');
    const levelEl = document.getElementById('level');

    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const playAgainBtn = document.getElementById('playAgainBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    const colors = {
      I: '#38bdf8',
      O: '#facc15',
      T: '#c084fc',
      S: '#4ade80',
      Z: '#f87171',
      J: '#60a5fa',
      L: '#fb923c'
    };

    const pieces = {
      I: [[1,1,1,1]],
      O: [[1,1],[1,1]],
      T: [[0,1,0],[1,1,1]],
      S: [[0,1,1],[1,1,0]],
      Z: [[1,1,0],[0,1,1]],
      J: [[1,0,0],[1,1,1]],
      L: [[0,0,1],[1,1,1]]
    };

    let board = [];
    let current = null;
    let score = 0;
    let lines = 0;
    let level = 1;
    let dropCounter = 0;
    let dropInterval = 800;
    let lastTime = 0;
    let animationId = null;
    let paused = false;
    let gameOver = false;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function randomPiece() {
      const keys = Object.keys(pieces);
      const type = keys[Math.floor(Math.random() * keys.length)];
      const shape = pieces[type].map(row => [...row]);
      return {
        type,
        shape,
        x: Math.floor(COLS / 2) - Math.ceil(shape[0].length / 2),
        y: 0
      };
    }

    function resetGame() {
      board = createBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 800;
      dropCounter = 0;
      lastTime = 0;
      paused = false;
      gameOver = false;
      pauseBtn.textContent = '一時停止';
      gameOverOverlay.classList.remove('active');
      updateStats();
      spawnPiece();
      draw();
    }

    function spawnPiece() {
      current = randomPiece();
      if (collides(current.x, current.y, current.shape)) {
        endGame();
      }
    }

    function collides(x, y, shape) {
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (!shape[r][c]) continue;
          const nx = x + c;
          const ny = y + r;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
          if (ny >= 0 && board[ny][nx]) return true;
        }
      }
      return false;
    }

    function mergePiece() {
      for (let r = 0; r < current.shape.length; r++) {
        for (let c = 0; c < current.shape[r].length; c++) {
          if (current.shape[r][c]) {
            const by = current.y + r;
            const bx = current.x + c;
            if (by >= 0) board[by][bx] = current.type;
          }
        }
      }
    }

    function clearLines() {
      let cleared = 0;
      outer:
      for (let r = ROWS - 1; r >= 0; r--) {
        for (let c = 0; c < COLS; c++) {
          if (!board[r][c]) continue outer;
        }
        board.splice(r, 1);
        board.unshift(Array(COLS).fill(0));
        cleared++;
        r++;
      }

      if (cleared > 0) {
        const scoreTable = [0, 100, 300, 500, 800];
        score += scoreTable[cleared] * level;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(120, 800 - (level - 1) * 60);
        updateStats();
      }
    }

    function rotate(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function tryRotate() {
      const rotated = rotate(current.shape);
      const kicks = [0, -1, 1, -2, 2];
      for (const k of kicks) {
        if (!collides(current.x + k, current.y, rotated)) {
          current.x += k;
          current.shape = rotated;
          draw();
          return;
        }
      }
    }

    function move(dir) {
      if (paused || gameOver) return;
      if (!collides(current.x + dir, current.y, current.shape)) {
        current.x += dir;
        draw();
      }
    }

    function softDrop() {
      if (paused || gameOver) return;
      if (!collides(current.x, current.y + 1, current.shape)) {
        current.y++;
        score += 1;
        updateStats();
      } else {
        lockPiece();
      }
      draw();
    }

    function hardDrop() {
      if (paused || gameOver) return;
      let moved = 0;
      while (!collides(current.x, current.y + 1, current.shape)) {
        current.y++;
        moved++;
      }
      score += moved * 2;
      updateStats();
      lockPiece();
      draw();
    }

    function lockPiece() {
      mergePiece();
      clearLines();
      spawnPiece();
    }

    function updateStats() {
      scoreEl.textContent = score;
      linesEl.textContent = lines;
      levelEl.textContent = level;
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#0b1220';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (board[y][x]) {
            drawCell(x, y, colors[board[y][x]]);
          } else {
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.strokeRect(x * BLOCK, y * BLOCK, BLOCK, BLOCK);
          }
        }
      }
    }

    function drawGhost() {
      let ghostY = current.y;
      while (!collides(current.x, ghostY + 1, current.shape)) {
        ghostY++;
      }

      for (let r = 0; r < current.shape.length; r++) {
        for (let c = 0; c < current.shape[r].length; c++) {
          if (current.shape[r][c]) {
            const gx = current.x + c;
            const gy = ghostY + r;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(gx * BLOCK, gy * BLOCK, BLOCK, BLOCK);
          }
        }
      }
    }

    function drawPiece() {
      drawGhost();
      for (let r = 0; r < current.shape.length; r++) {
        for (let c = 0; c < current.shape[r].length; c++) {
          if (current.shape[r][c]) {
            drawCell(current.x + c, current.y + r, colors[current.type]);
          }
        }
      }
    }

    function drawPauseText() {
      if (!paused) return;
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('一時停止中', canvas.width / 2, canvas.height / 2);
    }

    function draw() {
      drawBoard();
      if (current && !gameOver) drawPiece();
      drawPauseText();
    }

    function update(time = 0) {
      if (gameOver) return;
      const delta = time - lastTime;
      lastTime = time;

      if (!paused) {
        dropCounter += delta;
        if (dropCounter > dropInterval) {
          if (!collides(current.x, current.y + 1, current.shape)) {
            current.y++;
          } else {
            lockPiece();
          }
          dropCounter = 0;
          draw();
        }
      }

      animationId = requestAnimationFrame(update);
    }

    function endGame() {
      gameOver = true;
      draw();
      gameOverOverlay.classList.add('active');
      if (animationId) cancelAnimationFrame(animationId);
    }

    function startGame() {
      startScreen.classList.remove('active');
      gameScreen.classList.add('active');
      resetGame();
      if (animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(update);
    }

    function restartGame() {
      resetGame();
      if (animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(update);
    }

    function togglePause() {
      if (gameOver) return;
      paused = !paused;
      pauseBtn.textContent = paused ? '再開' : '一時停止';
      draw();
    }

    function bindPress(id, fn) {
      const el = document.getElementById(id);
      el.addEventListener('click', fn);
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        fn();
      }, { passive: false });
    }

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', restartGame);
    playAgainBtn.addEventListener('click', restartGame);
    pauseBtn.addEventListener('click', togglePause);

    bindPress('leftBtn', () => move(-1));
    bindPress('rightBtn', () => move(1));
    bindPress('rotateBtn', tryRotate);
    bindPress('downBtn', softDrop);      // 下に1マス
    bindPress('hardDropBtn', hardDrop);  // 一番下まで

    // キーボード対応（PCでも遊べる）
    window.addEventListener('keydown', (e) => {
      if (!gameScreen.classList.contains('active')) return;
      if (e.key === 'ArrowLeft') move(-1);
      else if (e.key === 'ArrowRight') move(1);
      else if (e.key === 'ArrowDown') softDrop();
      else if (e.key === ' ' || e.key === 'ArrowUp') tryRotate();
      else if (e.key.toLowerCase() === 'x') hardDrop();
      else if (e.key.toLowerCase() === 'p') togglePause();
    });

    // 初期描画
    drawBoard();
  </script>
</body>
</html>
