<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アプリ一覧</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f5;
      color: #222;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      font-weight: 700;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    li + li {
      margin-top: 12px;
    }

    a {
      display: block;
      padding: 16px 18px;
      border: 1px solid #d7d7d0;
      border-radius: 8px;
      background: #fff;
      color: #125c8a;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
    }

    a:hover,
    a:focus {
      border-color: #125c8a;
      background: #eef7fb;
      outline: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>アプリ一覧</h1>

    <ul>
      <li>
        <a href="https://azurepic.github.io/draw_v0/">お絵描きアプリ</a>
      </li>
    </ul>
  </main>
</body>
</html>
