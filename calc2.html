<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>九九テンポ</title><style>
body{margin:0;background:#f7f5ee;font-family:system-ui,"Hiragino Sans","Yu Gothic",sans-serif;color:#272727;overflow:hidden}
.app{max-width:520px;margin:auto;padding:8px;height:100vh;display:flex;flex-direction:column}
.card{background:#fff;border:2px solid #e8e2d6;border-radius:18px;box-shadow:0 4px 12px #0001;padding:10px;margin-bottom:8px}
h1{text-align:center;margin:2px 0;font-size:28px}.sub{text-align:center;color:#777;font-weight:700}.ttl{font-weight:900;margin:14px 0 8px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button{border:0;border-radius:14px;font-weight:900;touch-action:manipulation}.dan,.mode{padding:14px;font-size:19px;background:#f1eadf;color:#4b4035}
.on{background:linear-gradient(135deg,#ffb347,#ff7f50)!important;color:white!important}.primary{width:100%;padding:15px;margin-top:14px;font-size:22px;background:#22c55e;color:white}
.hidden{display:none!important}.top{display:flex;justify-content:space-between;font-weight:900;color:#777;font-size:14px}.bar{height:8px;background:#eadfce;border-radius:99px;overflow:hidden;margin:4px 0 6px}.prog{height:100%;width:0;background:linear-gradient(90deg,#ffb347,#ff7f50)}
.matrix{display:grid;grid-template-columns:18px repeat(9,1fr);gap:2px;justify-items:center;align-items:center}.lab{font-size:10px;font-weight:900;color:#8a7b6c}
.dot{width:min(4.8vw,19px);height:min(4.8vw,19px);border-radius:50%;background:#d8d2c8;border:1px solid #c9c1b6}
.dot.a{background:linear-gradient(135deg,#ffb347,#ff7f50);border-color:#ff7f50;transform:scale(1.04)}.cap{text-align:center;font-weight:900;color:#6b4a2b;margin-top:3px;font-size:12px}
.q{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:14px;min-height:86px;text-align:left}
.formula{font-size:46px;font-weight:1000;line-height:1}.reading{font-size:20px;font-weight:900;color:#6b4a2b}.ans{width:72px;height:54px;font-size:42px;font-weight:1000;text-align:center}
.fb{position:absolute;inset:0;background:#fffffff0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;font-weight:1000}.fb.show{opacity:1}.mark{font-size:54px}.full{font-size:25px}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:auto}.key{height:50px;font-size:26px;background:white;border:2px solid #eadfce}.enter{background:#ff8a50;color:white}.clear{background:#eee7dc}
.score{text-align:center;font-size:44px;font-weight:1000;color:#16a34a}.detail{text-align:center;color:#777;font-weight:800;line-height:1.6}
</style></head><body><main class="app">

<section id="start" class="card">
<h1>九九テンポ</h1><div class="sub">えらんだ段をぜんぶ1回ずつ！</div>
<div class="ttl">① やる段をえらぶ</div><div id="dans" class="grid"></div>
<div class="ttl">② 出すじゅんばん</div><div class="row">
<button class="mode on" data-m="order">じゅんばん</button><button class="mode" data-m="random">ランダム</button>
</div><button id="go" class="primary">スタート</button>
</section>

<section id="quiz" class="hidden">
<div class="top"><div id="cnt"></div><div id="tim"></div></div><div class="bar"><div id="prog" class="prog"></div></div>
<div class="card"><div style="display:flex;justify-content:space-between;color:#777;font-weight:900;font-size:12px"><span>たて：かけられる数</span><span>よこ：かける数</span></div><div id="mat" class="matrix"></div><div id="cap" class="cap"></div></div>
<div class="card q"><div><div id="f" class="formula"></div><div id="r" class="reading"></div></div><div id="ans" class="ans"></div><div id="fb" class="fb"><div id="mk" class="mark"></div><div id="full" class="full"></div></div></div>
<div class="keys">
<button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button>
<button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button>
<button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button>
<button class="key clear" data-k="c">けす</button><button class="key" data-k="0">0</button><button class="key enter" data-k="e">OK</button>
</div></section>

<section id="res" class="card hidden"><h1>おしまい！</h1><div class="score" id="score"></div><div class="detail" id="detail"></div><button id="again" class="primary">もういちど</button><button id="back" class="primary" style="background:#aaa">段をえらびなおす</button></section>

</main><script>
const raw=[
[1,1,"いんいちが",1,"いち"],[1,2,"いんにが",2,"に"],[1,3,"いんさんが",3,"さん"],[1,4,"いんしが",4,"し"],[1,5,"いんごが",5,"ご"],[1,6,"いんろくが",6,"ろく"],[1,7,"いんしちが",7,"しち"],[1,8,"いんはちが",8,"はち"],[1,9,"いんくが",9,"く"],
[2,1,"にいちが",2,"に"],[2,2,"ににんが",4,"し"],[2,3,"にさんが",6,"ろく"],[2,4,"にしが",8,"はち"],[2,5,"にご",10,"じゅう"],[2,6,"にろく",12,"じゅうに"],[2,7,"にしち",14,"じゅうし"],[2,8,"にはち",16,"じゅうろく"],[2,9,"にく",18,"じゅうはち"],
[3,1,"さんいちが",3,"さん"],[3,2,"さんにが",6,"ろく"],[3,3,"さざんが",9,"く"],[3,4,"さんし",12,"じゅうに"],[3,5,"さんご",15,"じゅうご"],[3,6,"さぶろく",18,"じゅうはち"],[3,7,"さんしち",21,"にじゅういち"],[3,8,"さんぱ",24,"にじゅうし"],[3,9,"さんく",27,"にじゅうしち"],
[4,1,"しいちが",4,"し"],[4,2,"しにが",8,"はち"],[4,3,"しさん",12,"じゅうに"],[4,4,"しし",16,"じゅうろく"],[4,5,"しご",20,"にじゅう"],[4,6,"しろく",24,"にじゅうし"],[4,7,"ししち",28,"にじゅうはち"],[4,8,"しは",32,"さんじゅうに"],[4,9,"しく",36,"さんじゅうろく"],
[5,1,"ごいちが",5,"ご"],[5,2,"ごに",10,"じゅう"],[5,3,"ごさん",15,"じゅうご"],[5,4,"ごし",20,"にじゅう"],[5,5,"ごご",25,"にじゅうご"],[5,6,"ごろく",30,"さんじゅう"],[5,7,"ごしち",35,"さんじゅうご"],[5,8,"ごは",40,"しじゅう"],[5,9,"ごく",45,"しじゅうご"],
[6,1,"ろくいちが",6,"ろく"],[6,2,"ろくに",12,"じゅうに"],[6,3,"ろくさん",18,"じゅうはち"],[6,4,"ろくし",24,"にじゅうし"],[6,5,"ろくご",30,"さんじゅう"],[6,6,"ろくろく",36,"さんじゅうろく"],[6,7,"ろくしち",42,"しじゅうに"],[6,8,"ろくは",48,"しじゅうはち"],[6,9,"ろっく",54,"ごじゅうし"],
[7,1,"しちいちが",7,"しち"],[7,2,"しちに",14,"じゅうし"],[7,3,"しちさん",21,"にじゅういち"],[7,4,"しちし",28,"にじゅうはち"],[7,5,"しちご",35,"さんじゅうご"],[7,6,"しちろく",42,"しじゅうに"],[7,7,"しちしち",49,"しじゅうく"],[7,8,"しちは",56,"ごじゅうろく"],[7,9,"しちく",63,"ろくじゅうさん"],
[8,1,"はちいちが",8,"はち"],[8,2,"はちに",16,"じゅうろく"],[8,3,"はちさん",24,"にじゅうし"],[8,4,"はちし",32,"さんじゅうに"],[8,5,"はちご",40,"しじゅう"],[8,6,"はちろく",48,"しじゅうはち"],[8,7,"はちしち",56,"ごじゅうろく"],[8,8,"はっぱ",64,"ろくじゅうし"],[8,9,"はちく",72,"しちじゅうに"],
[9,1,"くいちが",9,"く"],[9,2,"くに",18,"じゅうはち"],[9,3,"くさん",27,"にじゅうしち"],[9,4,"くし",36,"さんじゅうろく"],[9,5,"くご",45,"しじゅうご"],[9,6,"くろく",54,"ごじゅうし"],[9,7,"くしち",63,"ろくじゅうさん"],[9,8,"くは",72,"しちじゅうに"],[9,9,"くく",81,"はちじゅういち"]];
const $=id=>document.getElementById(id);let sel=new Set([2]),mode="order",qs=[],i=0,inp="",st=0,timer,lock=false;
for(let n=1;n<=9;n++){let b=document.createElement("button");b.className="dan"+(sel.has(n)?" on":"");b.textContent=n+"の段";b.onclick=()=>{sel.has(n)?sel.delete(n):sel.add(n);b.classList.toggle("on")};$("dans").appendChild(b)}
document.querySelectorAll(".mode").forEach(b=>b.onclick=()=>{mode=b.dataset.m;document.querySelectorAll(".mode").forEach(x=>x.classList.remove("on"));b.classList.add("on")});
function buildMat(){let m=$("mat");m.innerHTML="<div></div>";for(let x=1;x<=9;x++)m.innerHTML+=`<div class=lab>${x}</div>`;for(let y=1;y<=9;y++){m.innerHTML+=`<div class=lab>${y}</div>`;for(let x=1;x<=9;x++)m.innerHTML+=`<div class=dot data-x=${x} data-y=${y}></div>`}}
function updMat(a,b){document.querySelectorAll(".dot").forEach(d=>d.classList.toggle("a",+d.dataset.y<=a&&+d.dataset.x<=b));$("cap").textContent=`${a} × ${b} = ${a*b}こ`}
function shuf(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(){if(!sel.size)return alert("段をえらんでね");qs=raw.filter(q=>sel.has(q[0]));if(mode=="random")qs=shuf(qs);i=0;inp="";st=performance.now();$("start").classList.add("hidden");$("res").classList.add("hidden");$("quiz").classList.remove("hidden");timer=setInterval(()=>{$("tim").textContent=((performance.now()-st)/1000).toFixed(1)+"秒"},100);show()}
function show(){let q=qs[i];inp="";$("f").textContent=q[0]+"×"+q[1];$("r").textContent=q[2];$("ans").textContent="";$("cnt").textContent=(i+1)+" / "+qs.length;$("prog").style.width=(i/qs.length*100)+"%";updMat(q[0],q[1]);$("fb").className="fb";lock=false}
function key(k){if(lock)return;if(/\d/.test(k)){if(inp.length<2){inp+=k;$("ans").textContent=inp;beep(520,.03)}}else if(k=="c"){inp="";$("ans").textContent=""}else if(k=="e")check()}
function check(){if(inp==="")return;let q=qs[i];if(+inp===q[3]){lock=true;$("fb").className="fb show";$("mk").textContent="○";$("full").textContent=q[2]+q[4];$("fb").style.color="#32b768";beep(880,.08);setTimeout(()=>{i++;i>=qs.length?finish():show()},700)}else{$("fb").className="fb show";$("mk").textContent="×";$("full").textContent="ちがうよ";$("fb").style.color="#ef4444";buzz();inp="";$("ans").textContent="";setTimeout(()=>$("fb").className="fb",350)}}
function finish(){clearInterval(timer);let total=(performance.now()-st)/1000,avg=total/qs.length;$("prog").style.width="100%";$("quiz").classList.add("hidden");$("res").classList.remove("hidden");$("score").textContent=avg.toFixed(2)+"秒/問";$("detail").innerHTML=`全${qs.length}問<br>合計 ${total.toFixed(1)}秒`}
let ac;function beep(f,d){try{ac=ac||new(window.AudioContext||webkitAudioContext)();let o=ac.createOscillator(),g=ac.createGain();o.frequency.value=f;g.gain.value=.04;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.stop(ac.currentTime+d)}catch(e){}}
function buzz(){try{ac=ac||new(window.AudioContext||webkitAudioContext)();let o=ac.createOscillator(),g=ac.createGain();o.type="sawtooth";o.frequency.value=100;g.gain.value=.08;o.connect(g);g.connect(ac.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.2);o.stop(ac.currentTime+.2)}catch(e){}}
document.querySelectorAll(".key").forEach(b=>b.onclick=()=>key(b.dataset.k));document.onkeydown=e=>{if($("quiz").classList.contains("hidden"))return;if(/\d/.test(e.key))key(e.key);if(e.key=="Enter")key("e");if(e.key=="Backspace")key("c")};
$("go").onclick=start;$("again").onclick=start;$("back").onclick=()=>{$("res").classList.add("hidden");$("start").classList.remove("hidden")};buildMat();
</script></body></html>
