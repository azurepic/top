<body>
<div class="wrap">
  <header>

      <p class="subtitle">二人で、存在しない街の夜を少しずつ置いていく。</p>
    </div>
    <div class="top-actions">
      <button class="ghost" id="ruleBtn">遊び方</button>

  <main class="layout">

        <div class="label">今日の気配</div>

      </div>

        <div class="label">街に置くもの</div>

          <select id="kind">
            <option value="建物">建物</option>
            <option value="人">人</option>
            <option value="音">音</option>
            <option value="匂い">匂い</option>
            <option value="記憶">記憶</option>
            <option value="事件">小さな事件</option>
          </select>
          <textarea id="text" placeholder="例：深夜だけ開いてる花屋"></textarea>
          <input id="reaction" placeholder="相手の一言 例：そこ、夏だけ蚊が多そう" />
          <div class="row">

            <button id="ideaBtn">例を出す</button>
          </div>
          <p class="small">マスを選んでから置く。同じマスに重ねると、街の歴史が濃くなる。</p>

  </div>

<script>
const prompts = [
  "雨","秘密","昔","朝焼け","猫","自販機","遠い音","鍵","忘れ物","路地裏",
  "花","古い約束","誰もいない店","夏の終わり","苦い匂い","窓","地下","灯り",
  "日曜日","知らない駅","水たまり","閉店後","青い看板","小さな嘘","名前のない公園"
];

const ideas = {
  "建物":["深夜だけ開いてる花屋","二階だけ明かりがつく喫茶店","昔ゲームセンターだった薬局","入口が二つある銭湯","閉店しているのに匂いだけ残るパン屋"],
  "人":["毎朝同じ猫に話しかける老人","終電後にだけ現れる配達員","傘を絶対に差さない女の人","全部の店の閉店時間を知っている子","誰かの帰りを待っている駅員"],
  "音":["遠くの踏切みたいな音","窓の奥から聞こえるピアノの練習","雨どいを流れる水の音","誰もいないのに鈴が鳴る","換気扇が歌っているような低音"],
  "匂い":["濡れたアスファルトと石鹸の匂い","古い本棚の甘い埃","焦げた醤油の匂い","夜の公園の草の匂い","誰かのハンドクリームの残り香"],
  "記憶":["小学生のころ来た気がする角","誰かに告白されそうだった坂道","昔なくした鍵を探した場所","家に帰りたくなかった日のベンチ","名前だけ覚えている店"],
  "事件":["自販機から二本出てきた夜","猫が地図を持って逃げた","全員が同じ夢を見た朝","閉店後の店から拍手が聞こえた","知らない人に誕生日を祝われた"]
};

const moodKeys = [
  ["nostalgia","懐かしさ"],
  ["quiet","静けさ"],
  ["anxiety","不安"],
  ["life","生活感"]
];

let state = JSON.parse(localStorage.getItem("machi_kebai_v1") || "null") || newGame();
let selected = null;

function newGame(){
  return {
    tiles:Array.from({length:25},()=>({layers:[]})),
    player:"A",
    turn:1,
    prompt:prompts[Math.floor(Math.random()*prompts.length)],
    mood:{nostalgia:30,quiet:45,anxiety:20,life:35},
    log:[]
  };
}

function save(){ localStorage.setItem("machi_kebai_v1", JSON.stringify(state)); }

function render(){
  document.body.classList.toggle("night", state.turn > 14);
  document.getElementById("playerName").textContent = state.player;
  document.getElementById("turnCount").textContent = state.turn;
  document.getElementById("prompt").textContent = state.prompt;

  const board = document.getElementById("board");
  board.innerHTML = "";
  state.tiles.forEach((tile,i)=>{
    const div = document.createElement("div");
    div.className = "tile" + (tile.layers.length ? "" : " empty") + (selected===i ? " selected" : "");
    const top = tile.layers[tile.layers.length-1];
    div.innerHTML = top ? `
      <div class="kind">${top.kind} / ${top.prompt}</div>
      <div class="main">${escapeHtml(top.text)}</div>
      <div class="layers">${tile.layers.slice(-4).map(x=>`<span class="dot ${dotClass(x.kind)}"></span>`).join("")}</div>
    ` : "";
    div.onclick = ()=>{ selected=i; render(); if(tile.layers.length) showTile(i); };
    board.appendChild(div);
  });

  const bars = document.getElementById("moodbars");
  bars.innerHTML = moodKeys.map(([k,j])=>`
    <div class="barrow">
      <span>${j}</span>
      <div class="bar"><div class="fill" style="width:${state.mood[k]}%"></div></div>
      <span>${state.mood[k]}</span>
    </div>`).join("");

  const log = document.getElementById("log");
  log.innerHTML = state.log.slice().reverse().map(x=>`
    <div class="logitem"><b>${x.player}</b> が「${escapeHtml(x.text)}」を置いた。<br>相手：${escapeHtml(x.reaction || "……")}</div>
  `).join("");
  save();
}

function dotClass(kind){
  if(kind==="記憶") return "memory";
  if(kind==="匂い") return "smell";
  if(kind==="音") return "sound";
  return "";
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}

function drawPrompt(){
  let p;
  do { p = prompts[Math.floor(Math.random()*prompts.length)]; } while(p===state.prompt);
  state.prompt = p;
  render();
}

function place(){
  const text = document.getElementById("text").value.trim();
  const reaction = document.getElementById("reaction").value.trim();
  const kind = document.getElementById("kind").value;
  if(selected===null){ alert("先にマスを選んでね。"); return; }
  if(!text){ alert("街に置くものを書いてね。"); return; }

  const layer = {kind,text,reaction,prompt:state.prompt,player:state.player,time:Date.now()};
  state.tiles[selected].layers.push(layer);
  state.log.push(layer);
  changeMood(kind, text + state.prompt);
  state.player = state.player === "A" ? "B" : "A";
  state.turn++;
  document.getElementById("text").value = "";
  document.getElementById("reaction").value = "";
  drawPrompt();
}

function changeMood(kind, s){
  const add = (k,v)=> state.mood[k] = Math.max(0,Math.min(100,state.mood[k]+v));
  if(kind==="記憶") add("nostalgia",12);
  if(kind==="匂い") { add("nostalgia",5); add("life",5); }
  if(kind==="音") { add("quiet", Math.random()>.5 ? 7 : -5); add("anxiety",4); }
  if(kind==="人") add("life",12);
  if(kind==="事件") add("anxiety",13);
  if(/昔|忘れ|古い|雨|公園|駅|鍵/.test(s)) add("nostalgia",6);
  if(/秘密|地下|誰も|夜|閉店/.test(s)) add("anxiety",5);
  if(/猫|花|朝|日曜|石鹸/.test(s)) add("quiet",5);
  Object.keys(state.mood).forEach(k=>state.mood[k]=Math.round(state.mood[k]));
}

function idea(){
  const kind = document.getElementById("kind").value;
  const arr = ideas[kind] || ideas["建物"];
  document.getElementById("text").value = arr[Math.floor(Math.random()*arr.length)];
  const reacts = ["そこ、妙に好き。","この場所だけ時間が遅そう。","たぶん雨の日に行くとよさそう。","ちょっと怖いけど住める。","ここから物語が始まりそう。"];
  document.getElementById("reaction").value = reacts[Math.floor(Math.random()*reacts.length)];
}

function showTile(i){
  const tile = state.tiles[i];
  if(!tile.layers.length) return;
  openModal("この場所の記録", `
    <div class="details">
      ${tile.layers.map((x,n)=>`
        <div class="logitem">
          <span class="chip">${n+1}</span><span class="chip">${x.kind}</span><span class="chip">${x.prompt}</span><br>
          <b>${escapeHtml(x.text)}</b><br>
          <span>相手：${escapeHtml(x.reaction || "……")}</span>
        </div>
      `).join("")}
    </div>
  `);
}

function cityReading(){
  const filled = state.tiles.filter(t=>t.layers.length).length;
  const all = state.tiles.flatMap(t=>t.layers);
  const topMood = moodKeys.slice().sort((a,b)=>state.mood[b[0]]-state.mood[a[0]])[0][1];
  const words = all.slice(-6).map(x=>x.text).join("、");
  const text = `この街には、${filled}か所の気配が置かれました。

いちばん濃いムードは「${topMood}」。

最近の通りには、
${words || "まだ何もない夜"}
が残っています。

たぶんこの街は、勝つためではなく、
あとから「なんかあの場所よかったね」と言うためにあります。`;
  openModal("街を読む", `<div class="ending">${escapeHtml(text)}</div>`);
}

function openModal(title, body){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modal").classList.add("show");
}

document.getElementById("drawBtn").onclick = drawPrompt;
document.getElementById("placeBtn").onclick = place;
document.getElementById("ideaBtn").onclick = idea;
document.getElementById("endBtn").onclick = cityReading;
document.getElementById("resetBtn").onclick = ()=>{
  if(confirm("今の街を消して、新しい街を作る？")){
    state = newGame(); selected=null; render();
  }
};
document.getElementById("ruleBtn").onclick = ()=> openModal("遊び方", `
  <p>二人で交互に、5×5の街へ「建物・人・音・匂い・記憶・小さな事件」を置いていくゲームです。</p>
  <p>1. 今日の気配を見る。<br>2. マスを選ぶ。<br>3. その気配っぽいものを書く。<br>4. 相手が一言だけ反応する。<br>5. 置く。</p>
  <p>同じマスに重ねると、その場所の歴史が増えます。勝敗はありません。最後に「街を読む」を押して、できあがった街を眺めます。</p>
  <p>データはこのブラウザの localStorage に保存されます。</p>
`);
document.getElementById("closeModal").onclick = ()=>document.getElementById("modal").classList.remove("show");
document.getElementById("modal").onclick = e=>{ if(e.target.id==="modal") e.currentTarget.classList.remove("show"); };

render();
</script>
</body>
</html>
'''
path = '/mnt/data/machi_no_kehai.html'
with open(path, 'w', encoding='utf-8') as f:
